micronaut:
  server:
    port: -1
    cors:
      configurations:
        nextjs-frontend:
          allowed-origins:
            - http://localhost:3000
  security:
    token:
      jwt:
        signatures:
          secret:
            generator:
              secret: test-secret-key-do-not-use-in-production-min-32-chars

datasources:
  default:
    url: jdbc:postgresql://localhost:5432/wikiaim
    driverClassName: org.postgresql.Driver
    username: wikiaim
    password: wikipass

jpa:
  default:
    properties:
      hibernate:
        hbm2ddl:
          auto: validate
        show_sql: true

flyway:
  datasources:
    default:
      enabled: true
      locations: classpath:db/migration

test-resources:
  containers:
    postgres:
      enabled: false
