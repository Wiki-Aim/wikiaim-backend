micronaut:
  application:
    name: wikiaim-backend
  server:
    cors:
      enabled: true
      configurations:
        nextjs-frontend:
          allowed-origins:
            - ${CORS_ORIGIN}
          allowed-methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          allowed-headers:
            - Content-Type
            - Authorization
    port: 8080
  router:
    static-resources:
      swagger:
        paths: classpath:META-INF/swagger
        mapping: /swagger/**
      swagger-ui:
        paths: classpath:META-INF/swagger/views/swagger-ui
        mapping: /swagger-ui/**
  http:
    services:
      discord:
        url: https://discord.com
        read-timeout: 15s
  security:
    authentication: bearer
    token:
      jwt:
        signatures:
          secret:
            generator:
              secret: ${JWT_SECRET}
              jws-algorithm: HS256
        generator:
          access-token:
            expiration: 3600
    intercept-url-map:
      - pattern: /swagger/**
        access:
          - isAnonymous()
      - pattern: /swagger-ui/**
        access:
          - isAnonymous()

datasources:
  default:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME:wikiaim}
    driverClassName: org.postgresql.Driver
    username: ${DB_USERNAME:wikiaim}
    password: ${DB_PASSWORD}

jpa:
  default:
    properties:
      hibernate:
        hbm2ddl:
          auto: validate
        show_sql: false

flyway:
  datasources:
    default:
      enabled: true
      locations: classpath:db/migration
