name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: wikiaim
          POSTGRES_PASSWORD: wikipass
          POSTGRES_DB: wikiaim
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'

      - name: Run tests
        run: mvn verify -B

  build-and-push:
    name: Build & Push
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      image-tag: ${{ steps.set-env.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine environment
        id: set-env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
            echo "image_tag=prod" >> $GITHUB_OUTPUT
          else
            echo "environment=preprod" >> $GITHUB_OUTPUT
            echo "image_tag=preprod" >> $GITHUB_OUTPUT
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.set-env.outputs.image_tag }}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy (${{ needs.build-and-push.outputs.environment }})
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: ${{ needs.build-and-push.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USERNAME: ${{ secrets.VPS_USERNAME }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          GHCR_USER: ${{ github.actor }}
          ENV_NAME: ${{ needs.build-and-push.outputs.environment }}
        run: |
          echo "$SSH_KEY" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key
          COMMON_OPTS="-o StrictHostKeyChecking=no -i /tmp/ssh_key"
          PROJECT="wikiaim-${ENV_NAME}"

          scp $COMMON_OPTS -P $VPS_PORT docker-compose.deploy.yml $VPS_USERNAME@$VPS_HOST:/var/www/wikiaim/

          ssh $COMMON_OPTS -p $VPS_PORT $VPS_USERNAME@$VPS_HOST "\
            echo '${GHCR_PAT}' | docker login ghcr.io -u ${GHCR_USER} --password-stdin && \
            cd /var/www/wikiaim && \
            docker compose -f docker-compose.deploy.yml --env-file ${ENV_NAME}/.env -p ${PROJECT} pull app && \
            docker compose -f docker-compose.deploy.yml --env-file ${ENV_NAME}/.env -p ${PROJECT} up -d --remove-orphans"

          rm /tmp/ssh_key
